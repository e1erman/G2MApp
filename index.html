<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G2 Master</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;800&display=swap');

  :root {
    --bg:    #0A0A0A;
    --card:  #131313;
    --acc:   #00E5FF;
    --acc2:  #FF3D71;
    --dim:   #2A2A2A;
    --dimtx: #444;
    --fg:    #C8C8C8;
    --grn:   #00FF88;
    --red:   #FF4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--dim);
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    color: var(--acc);
    letter-spacing: 0.15em;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }
  .status-dot.on { background: var(--grn); box-shadow: 0 0 8px var(--grn); }

  .status-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--dimtx);
  }

  #btn-connect {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    background: var(--acc);
    color: var(--bg);
    border: none;
    padding: 7px 16px;
    cursor: pointer;
    font-weight: 700;
    transition: opacity 0.2s;
  }
  #btn-connect:disabled { opacity: 0.4; cursor: default; }

  /* ── MAIN LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    height: calc(100vh - 57px);
  }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; height: auto; }
    .right-panel { height: 340px; }
  }

  /* ── LEFT ── */
  .left-panel {
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  @media (max-width: 700px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .stat-card {
    background: var(--card);
    padding: 12px 14px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px; height: 100%;
    background: var(--acc);
    opacity: 0.4;
  }
  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--dimtx);
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.8rem;
    color: var(--acc);
    line-height: 1;
  }
  .stat-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--dimtx);
    margin-top: 2px;
  }

  /* Pills */
  .pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pill {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 4px 10px;
    background: var(--card);
    color: var(--dimtx);
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  .pill.on  { color: var(--acc); }
  .pill.red { color: var(--red); }
  .pill.grn { color: var(--grn); }

  /* Command groups */
  .cmd-groups {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cmd-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cmd-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--dimtx);
    width: 80px;
    flex-shrink: 0;
    letter-spacing: 0.06em;
  }

  .cmd-btns { display: flex; gap: 4px; flex-wrap: wrap; }

  .cmd-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    padding: 5px 10px;
    background: var(--card);
    color: var(--fg);
    border: none;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, color 0.15s;
  }
  .cmd-btn:hover  { background: var(--acc); color: var(--bg); }
  .cmd-btn:active { background: var(--acc); color: var(--bg); opacity: 0.7; }
  .cmd-btn:disabled { opacity: 0.3; cursor: default; }

  /* Custom hex */
  .custom-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .custom-row .cmd-label { width: 80px; }

  #custom-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    background: var(--card);
    color: var(--acc);
    border: none;
    padding: 5px 10px;
    width: 180px;
    outline: none;
    letter-spacing: 0.08em;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    border-left: 1px solid var(--dim);
    display: flex;
    flex-direction: column;
  }

  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--dim);
  }

  .tab-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 10px 16px;
    background: none;
    border: none;
    color: var(--dimtx);
    cursor: pointer;
    letter-spacing: 0.1em;
    border-bottom: 2px solid transparent;
    transition: color 0.2s;
  }
  .tab-btn.active {
    color: var(--acc);
    border-bottom-color: var(--acc);
  }

  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; flex-direction: column; }

  /* Log */
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    line-height: 1.7;
  }

  .log-tx  { color: var(--acc); }
  .log-rx  { color: #333; }
  .log-sys { color: var(--grn); }
  .log-err { color: var(--red); }

  /* RX Table */
  #rx-table-wrap {
    flex: 1;
    overflow-y: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
  }

  thead th {
    text-align: left;
    padding: 8px 8px;
    color: var(--acc);
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--dim);
    position: sticky;
    top: 0;
    background: var(--bg);
  }

  tbody td {
    padding: 5px 8px;
    color: var(--fg);
    border-bottom: 1px solid #1a1a1a;
    transition: background 0.1s;
  }

  tbody tr.flash td { background: #0A2A1A; }

  .td-cmd  { color: var(--dimtx); }
  .td-val  { color: var(--acc); }
</style>
</head>
<body>

<header>
  <span class="logo">G2 MASTER</span>
  <div class="status-row">
    <div class="status-dot" id="dot"></div>
    <span class="status-text" id="status-text">Getrennt</span>
    <button id="btn-connect" onclick="connect()">VERBINDEN</button>
  </div>
</header>

<div class="main">
  <!-- LEFT -->
  <div class="left-panel">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">GESCHW.</div>
        <div class="stat-value" id="s-speed">0</div>
        <div class="stat-unit" id="s-unit">km/h</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">AKKU</div>
        <div class="stat-value" id="s-battery">—</div>
        <div class="stat-unit">%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">GANG</div>
        <div class="stat-value" id="s-gear">—</div>
        <div class="stat-unit">&nbsp;</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">SPANNUNG</div>
        <div class="stat-value" id="s-voltage">—</div>
        <div class="stat-unit">&nbsp;</div>
      </div>
    </div>

    <!-- Pills -->
    <div class="pills">
      <span class="pill" id="p-light">LICHT AUS</span>
      <span class="pill grn" id="p-lock">OFFEN</span>
      <span class="pill" id="p-cruise">CRUISE AUS</span>
      <span class="pill" id="p-start">ZERO START</span>
    </div>

    <!-- Commands -->
    <div class="cmd-groups">

      <div class="cmd-row">
        <span class="cmd-label">GANG</span>
        <div class="cmd-btns">
          <button class="cmd-btn" onclick="send('FF551F0100')">0</button>
          <button class="cmd-btn" onclick="send('FF551F0101')">1</button>
          <button class="cmd-btn" onclick="send('FF551F0102')">2</button>
          <button class="cmd-btn" onclick="send('FF551F0103')">3</button>
        </div>
      </div>

      <div class="cmd-row">
        <span class="cmd-label">SCHLOSS</span>
        <div class="cmd-btns">
          <button class="cmd-btn" onclick="send('FF55170102')">Sperren</button>
          <button class="cmd-btn" onclick="send('FF55170101')">Öffnen</button>
        </div>
      </div>

      <div class="cmd-row">
        <span class="cmd-label">LICHT</span>
        <div class="cmd-btns">
          <button class="cmd-btn" onclick="send('FF55240101')">AN</button>
          <button class="cmd-btn" onclick="send('FF55240100')">AUS</button>
        </div>
      </div>

      <div class="cmd-row">
        <span class="cmd-label">EINHEIT</span>
        <div class="cmd-btns">
          <button class="cmd-btn" onclick="send('FF55180101')">km/h</button>
          <button class="cmd-btn" onclick="send('FF55180102')">mph</button>
        </div>
      </div>

      <div class="cmd-row">
        <span class="cmd-label">START</span>
        <div class="cmd-btns">
          <button class="cmd-btn" onclick="send('FF551A0101')">Zero Start</button>
          <button class="cmd-btn" onclick="send('FF551A0102')">Kick Start</button>
        </div>
      </div>

      <div class="cmd-row">
        <span class="cmd-label">CRUISE CTRL</span>
        <div class="cmd-btns">
          <button class="cmd-btn" onclick="send('FF551D0101')">AN</button>
          <button class="cmd-btn" onclick="send('FF551D0102')">AUS</button>
        </div>
      </div>

      <div class="cmd-row">
        <span class="cmd-label">INFO</span>
        <div class="cmd-btns">
          <button class="cmd-btn" onclick="send('FF552600')">HW Version</button>
          <button class="cmd-btn" onclick="send('FF551E0200')">Self Test</button>
        </div>
      </div>

      <div class="cmd-row custom-row">
        <span class="cmd-label">CUSTOM</span>
        <input id="custom-input" placeholder="FF55..." maxlength="40">
        <button class="cmd-btn" onclick="sendCustom()">SEND</button>
      </div>

    </div>

    <!-- Serial / FW -->
    <div class="pills" style="margin-top:4px">
      <span class="pill" id="p-serial">S/N: —</span>
      <span class="pill" id="p-fw">FW: —</span>
      <span class="pill" id="p-km">KM: —</span>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('log', this)">LOG</button>
      <button class="tab-btn" onclick="switchTab('rx', this)">RX LIVE</button>
    </div>

    <div class="tab-content active" id="tab-log">
      <div id="log"></div>
    </div>

    <div class="tab-content" id="tab-rx">
      <div id="rx-table-wrap">
        <table>
          <thead>
            <tr>
              <th>CMD</th>
              <th>NAME</th>
              <th>RAW</th>
              <th>WERT</th>
            </tr>
          </thead>
          <tbody id="rx-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ── BLE ─────────────────────────────────────────
const READ_UUID  = '00008888-0000-1000-8000-00805f9b34fb';
const WRITE_UUID = '00008877-0000-1000-8000-00805f9b34fb';

let device, server, service, writeChar, readChar;
let keepaliveTimer = null;
let connected = false;

function checksum(hex) {
  let total = 0;
  for (let i = 0; i < hex.length; i += 2)
    total += parseInt(hex.substr(i, 2), 16);
  return (total % 256).toString(16).padStart(2, '0').toUpperCase();
}

function makeCmd(hex) {
  hex = hex.toUpperCase().replace(/\s/g, '');
  const full = hex + checksum(hex);
  const bytes = [];
  for (let i = 0; i < full.length; i += 2)
    bytes.push(parseInt(full.substr(i, 2), 16));
  return new Uint8Array(bytes);
}

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'Scooter' }, { namePrefix: 'KuKirin' }, { namePrefix: 'Kugoo' }],
      optionalServices: ['00007777-0000-1000-8000-00805f9b34fb']
    });
    log('Verbinde...', 'sys');
    server  = await device.gatt.connect();
    service = await server.getPrimaryService('00007777-0000-1000-8000-00805f9b34fb');
    writeChar = await service.getCharacteristic(WRITE_UUID);
    readChar  = await service.getCharacteristic(READ_UUID);
    await readChar.startNotifications();
    readChar.addEventListener('characteristicvaluechanged', onRx);
    device.addEventListener('gattserverdisconnected', onDisconnect);

    connected = true;
    setConnected(true);
    log('Verbunden!', 'sys');

    // Handshake
    await writeChar.writeValueWithoutResponse(makeCmd('FF550100'));
    log('>> FF 55 01 00 55 (HANDSHAKE)', 'tx');

    // Keepalive alle 3s
    keepaliveTimer = setInterval(async () => {
      if (connected) {
        try { await writeChar.writeValueWithoutResponse(makeCmd('FF550100')); }
        catch(e) {}
      }
    }, 3000);

  } catch(e) {
    log('Fehler: ' + e.message, 'err');
  }
}

function onDisconnect() {
  connected = false;
  if (keepaliveTimer) clearInterval(keepaliveTimer);
  setConnected(false);
  log('Verbindung getrennt.', 'err');
}

async function send(hex) {
  if (!connected || !writeChar) { log('Nicht verbunden!', 'err'); return; }
  const cmd = makeCmd(hex);
  const hexStr = Array.from(cmd).map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
  log('>> ' + hexStr, 'tx');
  await writeChar.writeValueWithoutResponse(cmd);
}

async function sendCustom() {
  const val = document.getElementById('custom-input').value.trim();
  if (val) await send(val);
}

// ── RX ──────────────────────────────────────────
const SILENT = new Set([0x01,0x02,0x03,0x04,0x06,0x0A,0x0B,0x0C,0x0D,
                        0x10,0x11,0x17,0x18,0x19,0x1A,0x1B,0x1C,0x1D,
                        0x1F,0x22,0x24]);

const CMD_NAMES = {
  0x02:'Seriennummer', 0x03:'Firmware', 0x04:'Hardware',
  0x06:'Unbekannt',    0x0A:'Geschwindigkeit', 0x0B:'Unbekannt',
  0x0C:'Gesamtkm',     0x0D:'Akku %',    0x10:'Speedmodus',
  0x11:'Unbekannt',    0x17:'Schloss',   0x18:'Einheit',
  0x19:'Light Module', 0x1A:'Startmodus',0x1B:'Spannung',
  0x1C:'Radgröße',     0x1D:'Cruise',    0x1F:'Gang',
  0x22:'Uptime',       0x24:'Frontlicht'
};

const rxRows = {}; // cmd -> tr element

function onRx(event) {
  const data = new Uint8Array(event.target.value.buffer);
  if (data.length < 3 || data[0] !== 0xFF || data[1] !== 0x55) return;

  const cmd = data[2];
  const payload = data.slice(3);
  const rawHex = Array.from(data).map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ');

  // Dekodieren
  const updates = decode(cmd, payload);
  applyUpdates(updates);
  updateRxTable(cmd, rawHex, updates);

  // Log nur für unbekannte CMDs
  if (!SILENT.has(cmd)) {
    log('<< ' + rawHex, 'rx');
  }
}

function decode(cmd, p) {
  const u = {};
  if (cmd === 0x0A && p.length >= 3) {
    const raw = (p[1] << 8) | p[2];
    u.speed = (raw / 1035).toFixed(1);
  } else if (cmd === 0x0D && p.length >= 2) {
    u.battery = p[1];
  } else if (cmd === 0x17 && p.length >= 2) {
    u.locked = p[1] === 2;
  } else if (cmd === 0x24 && p.length >= 2) {
    u.light = p[1] === 1;
  } else if (cmd === 0x1F && p.length >= 2) {
    u.gear = {0:'0',1:'1',2:'2',3:'3'}[p[1]] ?? '?';
  } else if (cmd === 0x18 && p.length >= 2) {
    u.unit = p[1] === 1 ? 'km/h' : 'mph';
  } else if (cmd === 0x1B && p.length >= 2) {
    u.voltage = {1:'24V',2:'36V',3:'48V',4:'60V'}[p[1]] ?? '?V';
  } else if (cmd === 0x02 && p.length >= 9) {
    u.serial = String.fromCharCode(...p.slice(1,9));
  } else if (cmd === 0x03 && p.length >= 9) {
    u.firmware = String.fromCharCode(...p.slice(1,9));
  } else if (cmd === 0x0C && p.length >= 5) {
    const km = ((p[1]<<24)|(p[2]<<16)|(p[3]<<8)|p[4]);
    u.km = (km / 1000).toFixed(0);
  } else if (cmd === 0x1D && p.length >= 2) {
    u.cruise = p[1] === 1;
  } else if (cmd === 0x1A && p.length >= 2) {
    u.startmode = p[1] === 1 ? 'ZERO START' : 'KICK START';
  }
  return u;
}

function applyUpdates(u) {
  if ('speed'    in u) setText('s-speed', u.speed);
  if ('battery'  in u) setText('s-battery', u.battery);
  if ('gear'     in u) setText('s-gear', u.gear);
  if ('voltage'  in u) setText('s-voltage', u.voltage);
  if ('unit'     in u) { setText('s-unit', u.unit); setPill('p-unit', u.unit, false); }
  if ('serial'   in u) setText('p-serial', 'S/N: ' + u.serial);
  if ('firmware' in u) setText('p-fw', 'FW: ' + u.firmware);
  if ('km'       in u) setText('p-km', 'KM: ' + u.km);
  if ('light'    in u) {
    const p = document.getElementById('p-light');
    p.textContent = u.light ? 'LICHT AN' : 'LICHT AUS';
    p.className = 'pill' + (u.light ? ' on' : '');
  }
  if ('locked'   in u) {
    const p = document.getElementById('p-lock');
    p.textContent = u.locked ? 'GESPERRT' : 'OFFEN';
    p.className = 'pill' + (u.locked ? ' red' : ' grn');
  }
  if ('cruise'   in u) {
    const p = document.getElementById('p-cruise');
    p.textContent = u.cruise ? 'CRUISE AN' : 'CRUISE AUS';
    p.className = 'pill' + (u.cruise ? ' on' : '');
  }
  if ('startmode' in u) {
    setText('p-start', u.startmode);
  }
}

function updateRxTable(cmd, rawHex, updates) {
  const name = CMD_NAMES[cmd] ?? `CMD ${cmd.toString(16).toUpperCase().padStart(2,'0')}`;
  let wert = Object.values(updates).join(' ') || rawHex.split(' ').slice(4).join(' ');
  const cmdHex = cmd.toString(16).toUpperCase().padStart(2,'0');

  if (cmd in rxRows) {
    const tr = rxRows[cmd];
    const cells = tr.querySelectorAll('td');
    const oldWert = cells[3].textContent;
    cells[2].textContent = rawHex;
    cells[3].textContent = wert;
    if (oldWert !== wert) flashRow(tr);
  } else {
    const tbody = document.getElementById('rx-tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="td-cmd">${cmdHex}</td><td>${name}</td><td>${rawHex}</td><td class="td-val">${wert}</td>`;
    tbody.appendChild(tr);
    rxRows[cmd] = tr;
  }
}

function flashRow(tr) {
  tr.classList.add('flash');
  setTimeout(() => tr.classList.remove('flash'), 400);
}

// ── UI helpers ───────────────────────────────────
function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

function setPill(id, text, active) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'pill' + (active ? ' on' : '');
}

function setConnected(on) {
  document.getElementById('dot').className = 'status-dot' + (on ? ' on' : '');
  document.getElementById('status-text').textContent = on ? 'Verbunden' : 'Getrennt';
  document.getElementById('btn-connect').disabled = on;
  document.getElementById('btn-connect').textContent = on ? 'VERBUNDEN' : 'VERBINDEN';
  document.querySelectorAll('.cmd-btn').forEach(b => b.disabled = !on);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function log(msg, cls='sys') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-' + cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// Buttons beim Start deaktivieren
setConnected(false);

// Enter auf Custom-Input
document.getElementById('custom-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendCustom();
});
</script>
</body>
</html>
